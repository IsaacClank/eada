services:
  db:
    build: ./backend/db
    ports:
      - 2000:5432
    environment:
      - POSTGRES_DB=eada
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=Password0.
    volumes:
      - ./backend/db/data:/var/lib/postgresql/data

  db_client:
    build: ./backend/db/pgadmin
    depends_on:
      - db
    ports:
      - 2001:80
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@mail.com
      - PGADMIN_DEFAULT_PASSWORD=Password0.

  api:
    build: ./backend/api
    ports:
      - 3000:3000
    develop:
      watch:
        - action: rebuild
          path: ./backend/api/package.json
        - action: sync+restart
          path: ./backend/api/src/routes
          target: /app/src/routes
        - action: sync+restart
          path: ./backend/api/.env.compose
          target: /app/.env

  spa:
    build: ./frontend/spa
    ports:
      - 3010:5173
